services:
  backend:
    build:
      context: ./backend
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks: [app]

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"
    networks: [app]

networks:
  app:
