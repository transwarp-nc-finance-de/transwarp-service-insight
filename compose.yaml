services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: service_insight
      POSTGRES_USER: service_insight
      POSTGRES_PASSWORD: service_insight_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_insight -d service_insight"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks: [index-internal]

  local-embedding:
    build:
      context: .
      dockerfile: local-embedding/Dockerfile
    environment:
      MODEL_DIR: /model
    volumes:
      - ${LOCAL_EMBEDDING_MODEL_PATH:-./.local/embedding-model-unconfigured}:/model:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    networks: [index-internal]

  backend:
    build:
      context: ./backend
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      local-embedding:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: service_insight
      DB_USER: service_insight
      DB_PASSWORD: service_insight_local
      KNOWLEDGE_STORAGE_PATH: /var/lib/service-insight/knowledge
      LOCAL_EMBEDDING_URL: http://local-embedding:8090
    volumes:
      - knowledge-files:/var/lib/service-insight/knowledge
    networks: [index-internal, edge]

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"
    networks: [edge]

networks:
  index-internal:
    internal: true
  edge:

volumes:
  postgres-data:
  knowledge-files:
