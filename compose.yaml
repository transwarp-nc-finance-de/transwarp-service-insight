services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: service_insight
      POSTGRES_USER: service_insight
      POSTGRES_PASSWORD: service_insight_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U service_insight -d service_insight"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks: [app]

  backend:
    build:
      context: ./backend
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: service_insight
      DB_USER: service_insight
      DB_PASSWORD: service_insight_local
      KNOWLEDGE_STORAGE_PATH: /var/lib/service-insight/knowledge
    volumes:
      - knowledge-files:/var/lib/service-insight/knowledge
    networks: [app]

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"
    networks: [app]

networks:
  app:

volumes:
  postgres-data:
  knowledge-files:
