<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SLA 报备知识库检索前置辅助 Demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: #243044;
      background: #f4f7fb;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      font-size: 14px;
    }

    a {
      color: #1769e0;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 224px minmax(0, 1fr);
    }

    .sidebar {
      background: #17233d;
      color: #c9d3e7;
      padding: 18px 0;
    }

    .brand {
      height: 46px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: inline-grid;
      place-items: center;
      background: #2c7df0;
      font-size: 13px;
      font-weight: 700;
    }

    .nav-group {
      margin-top: 18px;
    }

    .nav-title {
      padding: 12px 24px 8px;
      color: #7f8daa;
      font-size: 12px;
    }

    .nav-item {
      height: 42px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid transparent;
    }

    .nav-item.active {
      color: #fff;
      background: #20365f;
      border-left-color: #2c7df0;
    }

    .main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #e4eaf3;
    }

    .breadcrumb {
      color: #66758f;
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #526176;
    }

    .page {
      padding: 22px 28px 86px;
    }

    .notice {
      max-width: 1120px;
      margin: 0 auto 16px;
      padding: 16px 18px;
      background: #eef6ff;
      border: 1px solid #cfe3ff;
      border-radius: 6px;
      line-height: 1.7;
    }

    .notice-title {
      margin-bottom: 6px;
      color: #1758b8;
      font-weight: 700;
    }

    .form-card {
      max-width: 1120px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e2e8f2;
      border-radius: 6px;
      box-shadow: 0 6px 20px rgba(28, 52, 90, 0.06);
    }

    .section-title {
      padding: 16px 22px;
      border-bottom: 1px solid #e7edf5;
      color: #17233d;
      font-size: 16px;
      font-weight: 700;
    }

    .form-grid {
      padding: 22px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px 24px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #46566d;
      font-weight: 600;
    }

    .required {
      color: #e14c45;
      margin-right: 4px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cfd8e6;
      border-radius: 4px;
      padding: 9px 11px;
      color: #26364d;
      background: #fff;
      font: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #2c7df0;
      box-shadow: 0 0 0 3px rgba(44, 125, 240, 0.12);
    }

    textarea {
      min-height: 108px;
      resize: vertical;
      line-height: 1.6;
    }

    .field-note {
      margin-top: 6px;
      color: #7a8799;
      font-size: 12px;
    }

    .actions {
      position: sticky;
      bottom: 0;
      z-index: 10;
      padding: 14px 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid #e2e8f2;
      backdrop-filter: blur(8px);
    }

    .btn {
      min-width: 96px;
      height: 36px;
      border: 1px solid #c9d4e5;
      border-radius: 4px;
      padding: 0 18px;
      cursor: pointer;
      background: #fff;
      color: #34445c;
      font: inherit;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .btn:hover {
      border-color: #2c7df0;
      color: #1769e0;
    }

    .btn.primary {
      border-color: #1769e0;
      background: #1769e0;
      color: #fff;
    }

    .btn.primary:hover {
      background: #0f5cc9;
    }

    .btn.secondary {
      border-color: #2c7df0;
      color: #1769e0;
      background: #eef6ff;
    }

    .btn.secondary:hover {
      background: #dfeeff;
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.68;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: stretch;
      justify-content: flex-end;
      background: rgba(18, 30, 52, 0.38);
    }

    .overlay.open {
      display: flex;
    }

    .drawer {
      width: min(640px, 100vw);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: -10px 0 28px rgba(21, 34, 56, 0.22);
      animation: slideIn 0.18s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(32px);
        opacity: 0.8;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .drawer-header {
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e2e8f2;
    }

    .drawer-title {
      margin: 0;
      color: #17233d;
      font-size: 18px;
    }

    .mock-badge {
      margin-left: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      color: #8a4b00;
      background: #fff4da;
      border: 1px solid #ffd899;
      font-size: 12px;
      font-weight: 600;
    }

    .icon-button {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 4px;
      cursor: pointer;
      color: #5c6a80;
      background: transparent;
      font-size: 22px;
      line-height: 1;
    }

    .icon-button:hover {
      background: #edf3fb;
    }

    .drawer-body {
      flex: 1;
      overflow: auto;
      padding: 20px 22px;
    }

    .drawer-footer {
      padding: 14px 22px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      border-top: 1px solid #e2e8f2;
      background: #fff;
    }

    .loading-box {
      min-height: 210px;
      display: grid;
      place-items: center;
      text-align: center;
      color: #526176;
      line-height: 1.7;
    }

    .spinner {
      width: 38px;
      height: 38px;
      margin: 0 auto 16px;
      border: 4px solid #d7e7ff;
      border-top-color: #1769e0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .result-block {
      margin-bottom: 18px;
      padding: 14px 16px;
      border: 1px solid #e1e8f2;
      border-radius: 6px;
      background: #fbfdff;
    }

    .block-title {
      margin-bottom: 8px;
      color: #17233d;
      font-weight: 700;
    }

    .keyword-list,
    .scope-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 4px 9px;
      border-radius: 999px;
      color: #1758b8;
      background: #edf5ff;
      border: 1px solid #cfe3ff;
      font-size: 12px;
    }

    .diagnosis {
      margin: 0;
      color: #4a5870;
      line-height: 1.75;
    }

    .result-list {
      display: grid;
      gap: 12px;
    }

    .result-item {
      padding: 14px;
      border: 1px solid #dfe7f2;
      border-radius: 6px;
      background: #fff;
    }

    .result-head {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }

    .type-tag {
      flex: 0 0 auto;
      padding: 3px 7px;
      border-radius: 4px;
      color: #fff;
      background: #1769e0;
      font-size: 12px;
      line-height: 1.4;
    }

    .type-tag.history {
      background: #6d64d8;
    }

    .type-tag.sla {
      background: #0f8b7c;
    }

    .type-tag.manual {
      background: #d36a1f;
    }

    .type-tag.doc {
      background: #3b7b45;
    }

    .result-title {
      margin: 0;
      color: #1d2c43;
      font-size: 14px;
      line-height: 1.5;
    }

    .result-summary {
      margin: 0 0 8px;
      color: #58677c;
      line-height: 1.65;
    }

    .operation-tip {
      color: #5a4b19;
      background: #fff9e9;
      border-color: #f4df9a;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 76px;
      z-index: 50;
      display: none;
      min-width: 320px;
      max-width: min(520px, calc(100vw - 32px));
      padding: 12px 16px;
      color: #173b1f;
      background: #eaf8ee;
      border: 1px solid #bfe7c8;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(22, 40, 64, 0.18);
      transform: translateX(-50%);
      text-align: center;
      line-height: 1.6;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .page {
        padding: 16px 14px 82px;
      }

      .form-grid {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .actions {
        padding: 12px;
        flex-wrap: wrap;
      }

      .btn {
        min-width: 88px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">AI</span>
        <span>AIOps</span>
      </div>
      <nav class="nav-group" aria-label="模拟导航">
        <div class="nav-title">运维工作台</div>
        <div class="nav-item">概览看板</div>
        <div class="nav-item active">SLA 报备</div>
        <div class="nav-item">告警分析</div>
        <div class="nav-item">知识库</div>
        <div class="nav-title">系统管理</div>
        <div class="nav-item">用户中心</div>
        <div class="nav-item">配置管理</div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <strong>SLA 报备</strong>
          <span class="breadcrumb"> / 提交问题 / 知识库检索前置辅助 Demo</span>
        </div>
        <div class="top-actions">
          <span>演示环境</span>
          <span>当前用户：模拟数据</span>
        </div>
      </header>

      <section class="page">
        <div class="notice">
          <div class="notice-title">SLA 报备须知</div>
          <div>
            本页面为纯前端静态 Demo，页面字段、客户、集群、项目、问题描述、检索结果与链接均为模拟数据。
            知识库检索结果仅供参考，不代表最终根因或处理结论；SLA 是否提交、工单内容是否准确、处理建议是否适用于当前环境，均需要人工审核。
            无法解决时继续提交 SLA，由研发或相关责任人进一步处理。
          </div>
        </div>

        <form class="form-card" id="slaForm">
          <div class="section-title">SLA 基本信息</div>
          <div class="form-grid">
            <div class="form-field">
              <label for="issueType"><span class="required">*</span>问题类型</label>
              <select id="issueType">
                <option>功能不可用</option>
                <option>性能异常</option>
                <option>配置咨询</option>
              </select>
            </div>
            <div class="form-field">
              <label for="customer"><span class="required">*</span>ERP 客户名称</label>
              <input id="customer" value="ERP 客户 A（模拟数据）">
            </div>
            <div class="form-field">
              <label for="cluster"><span class="required">*</span>ERP 集群名称</label>
              <input id="cluster" value="erp-prod-cluster-01（模拟数据）">
            </div>
            <div class="form-field">
              <label for="project"><span class="required">*</span>ERP 项目名称</label>
              <input id="project" value="ERP 核心业务项目（模拟数据）">
            </div>
            <div class="form-field">
              <label for="component"><span class="required">*</span>产品组件</label>
              <select id="component">
                <option>Foundation</option>
                <option>Inceptor</option>
                <option>Hyperbase</option>
                <option>Kafka</option>
              </select>
            </div>
            <div class="form-field">
              <label for="version"><span class="required">*</span>产品版本</label>
              <input id="version" value="TDS-4.0.1">
            </div>
            <div class="form-field">
              <label for="severity"><span class="required">*</span>问题级别</label>
              <select id="severity">
                <option>Sev3</option>
                <option>Sev1</option>
                <option>Sev2</option>
                <option>Sev4</option>
              </select>
            </div>
            <div class="form-field">
              <label for="serviceType"><span class="required">*</span>服务类型</label>
              <select id="serviceType">
                <option>产品功能支持</option>
                <option>故障排查</option>
                <option>版本升级咨询</option>
              </select>
            </div>
            <div class="form-field full">
              <label for="summary"><span class="required">*</span>问题概述</label>
              <input id="summary" value="Foundation 审计日志归档功能不可用">
              <div class="field-note">模拟数据：用于演示提交前检索关键词生成。</div>
            </div>
            <div class="form-field full">
              <label for="description"><span class="required">*</span>问题描述</label>
              <textarea id="description">模拟数据：用户在 Foundation 页面执行审计日志归档时，归档按钮置灰且无法继续操作。当前仅用于演示知识库检索前置辅助，不代表真实客户问题、真实历史 SLA 或真实故障记录。</textarea>
            </div>
          </div>
        </form>
      </section>
    </main>
  </div>

  <div class="actions" aria-label="底部操作区">
    <button type="button" class="btn" id="cancelBtn">取消</button>
    <button type="button" class="btn secondary" id="searchBtn">知识库检索</button>
    <button type="button" class="btn primary" id="submitBtn">确定</button>
  </div>

  <div class="overlay" id="resultOverlay" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
    <section class="drawer">
      <header class="drawer-header">
        <h2 class="drawer-title" id="drawerTitle">知识库检索结果 <span class="mock-badge">模拟数据</span></h2>
        <button type="button" class="icon-button" id="closeIcon" aria-label="关闭">×</button>
      </header>
      <div class="drawer-body" id="drawerBody"></div>
      <footer class="drawer-footer">
        <button type="button" class="btn" id="closeBtn">关闭</button>
        <button type="button" class="btn primary" id="continueBtn">继续提交 SLA</button>
      </footer>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const mockKnowledgeResults = [
      {
        type: "Wiki",
        title: "Foundation 审计日志归档功能说明",
        summary: "介绍 Foundation 审计日志归档相关配置、使用限制和常见问题。该资料为模拟数据，仅用于 Demo 展示。",
        url: "https://example.com/wiki/foundation-audit-archive"
      },
      {
        type: "历史问题",
        title: "Foundation 审计日志归档按钮不可用问题处理记录",
        summary: "历史问题模拟记录显示，该类问题可能与产品版本、权限配置或功能开关有关，不能作为当前问题的最终结论。",
        url: "https://example.com/question/12345"
      },
      {
        type: "SLA案例",
        title: "TDS 4.0.1 Foundation 组件归档功能异常",
        summary: "模拟 SLA 案例记录了归档功能异常的排查路径和人工处理过程，实际是否适用需要提交人与处理人确认。",
        url: "https://example.com/sla/67890"
      },
      {
        type: "操作手册",
        title: "Foundation 组件常见问题排查手册",
        summary: "包含 Foundation 组件常见问题、日志路径、权限检查和配置检查方法，内容为模拟数据。",
        url: "https://example.com/manual/foundation-troubleshooting"
      },
      {
        type: "产品文档",
        title: "TDS-4.0.1 Foundation 审计能力配置参考",
        summary: "说明 TDS-4.0.1 中 Foundation 审计能力的配置项、依赖项和版本注意事项，需人工核对当前环境。",
        url: "https://example.com/docs/tds-401-foundation-audit"
      },
      {
        type: "Wiki",
        title: "SLA 提交前信息补全检查清单",
        summary: "模拟知识库条目，提示提交 SLA 前补充环境、版本、复现步骤、影响范围和相关日志。",
        url: "https://example.com/wiki/sla-precheck-list"
      }
    ];

    const searchBtn = document.getElementById("searchBtn");
    const submitBtn = document.getElementById("submitBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const overlay = document.getElementById("resultOverlay");
    const drawerBody = document.getElementById("drawerBody");
    const closeBtn = document.getElementById("closeBtn");
    const closeIcon = document.getElementById("closeIcon");
    const continueBtn = document.getElementById("continueBtn");
    const toast = document.getElementById("toast");

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function collectKeywords() {
      return [
        getValue("component"),
        getValue("version"),
        getValue("severity"),
        getValue("summary")
      ].filter(Boolean);
    }

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function getTypeClass(type) {
      if (type === "历史问题") return "history";
      if (type === "SLA案例") return "sla";
      if (type === "操作手册") return "manual";
      if (type === "产品文档") return "doc";
      return "";
    }

    function openDrawer() {
      overlay.classList.add("open");
    }

    function closeDrawer() {
      overlay.classList.remove("open");
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2800);
    }

    function renderLoading() {
      drawerBody.innerHTML = `
        <div class="loading-box">
          <div>
            <div class="spinner" aria-hidden="true"></div>
            <div>正在检索 Wiki、知识库、历史问题与 SLA 案例，请稍候...</div>
            <div class="field-note">本过程使用前端 setTimeout 和模拟数据，不调用真实接口。</div>
          </div>
        </div>
      `;
    }

    function renderResults(results) {
      const keywords = collectKeywords();
      const keywordHtml = keywords.map(item => `<span class="chip">${item}</span>`).join("");
      const scopeHtml = ["Wiki", "产品文档", "历史问题", "历史 SLA", "操作手册"]
        .map(item => `<span class="chip">${item}</span>`)
        .join("");
      const resultHtml = results.map(item => `
        <article class="result-item">
          <div class="result-head">
            <span class="type-tag ${getTypeClass(item.type)}">${item.type}</span>
            <h3 class="result-title">${item.title}</h3>
          </div>
          <p class="result-summary">${item.summary}</p>
          <a href="${item.url}" target="_blank" rel="noopener noreferrer">查看详情（模拟链接）</a>
        </article>
      `).join("");

      drawerBody.innerHTML = `
        <div class="result-block">
          <div class="block-title">检索关键词</div>
          <div class="keyword-list">${keywordHtml}</div>
        </div>
        <div class="result-block">
          <div class="block-title">检索范围</div>
          <div class="scope-list">${scopeHtml}</div>
        </div>
        <div class="result-block">
          <div class="block-title">前置诊断结论</div>
          <p class="diagnosis">
            系统已根据当前问题信息检索到若干相关资料，但当前 Demo 不进行真实根因判断，也不生成最终处理方案。
            检索结果仅供参考，置信度为中等；是否适用于当前环境需要人工审核。
            如参考资料无法解决当前问题，请继续提交 SLA，由研发或相关责任人进一步处理。
          </p>
          <p class="diagnosis">
            依据来源：页面表单字段与前端模拟知识库数据。仍需补充：真实环境日志、复现步骤、影响范围、权限与配置核查结果。
          </p>
        </div>
        <div class="result-block">
          <div class="block-title">推荐参考资料</div>
          <div class="result-list">${resultHtml}</div>
        </div>
        <div class="result-block operation-tip">
          <div class="block-title">操作提示</div>
          <p class="diagnosis">
            以上资料均为模拟数据，仅供参考。可关闭弹窗后点击原页面“确定”继续提交 SLA。
            “继续提交 SLA”按钮只关闭弹窗并提示人工确认，不会自动提交、自动闭单或自动处理 SLA。
          </p>
        </div>
      `;
    }

    searchBtn.addEventListener("click", () => {
      searchBtn.disabled = true;
      searchBtn.textContent = "检索中...";
      renderLoading();
      openDrawer();

      const delay = 1500 + Math.floor(Math.random() * 1501);
      window.setTimeout(() => {
        const count = 3 + Math.floor(Math.random() * 3);
        renderResults(shuffle(mockKnowledgeResults).slice(0, count));
        searchBtn.disabled = false;
        searchBtn.textContent = "知识库检索";
      }, delay);
    });

    closeBtn.addEventListener("click", closeDrawer);
    closeIcon.addEventListener("click", closeDrawer);

    continueBtn.addEventListener("click", () => {
      closeDrawer();
      showToast("请人工确认工单内容后，点击页面原“确定”按钮继续提交 SLA。");
    });

    submitBtn.addEventListener("click", () => {
      showToast("模拟提交 SLA：实际提交、问题分类、处理建议和复盘结论仍需人工审核。");
    });

    cancelBtn.addEventListener("click", () => {
      showToast("已取消本次模拟操作，表单内容未提交。");
    });

    overlay.addEventListener("click", event => {
      if (event.target === overlay) {
        closeDrawer();
      }
    });
  </script>
</body>
</html>
