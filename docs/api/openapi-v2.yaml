openapi: 3.0.3
info:
  title: Transwarp Service Insight API v2（DRAFT / PARTIALLY_IMPLEMENTED / APPROVED_FOR_IMPLEMENTATION）
  version: 2.0.0-draft.2
  description: |
    **DRAFT / PARTIALLY_IMPLEMENTED / APPROVED_FOR_IMPLEMENTATION**。本文件定义一期本地模拟闭环的候选契约，
    已由用户以 API、产品、安全负责人身份于 2026-07-14 明确批准进入实施；该批准不代表
    整个 API v2 或一期目标已经实现。当前仅实现本地 AuthSession 基础切片：
    `POST /api/v2/auth-sessions`、`GET /api/v2/auth-sessions/current` 和
    `DELETE /api/v2/auth-sessions/current`；其余 v2 operation 均为 NOT_IMPLEMENTED。
    所有业务示例均为 `模拟数据`；只允许模拟、公开或脱敏数据。

    一期实施状态为 READY_FOR_IMPLEMENTATION；v1 Mock 仍为兼容契约。当前 v2 切片不接真实身份、
    生产数据库或外部系统。v2 不创建正式 SLA、工单、ticketId 或提交回执；
    智能输出仅供人工参考，必须保留依据、置信度、人工介入建议和待补充信息，
    且不得阻断人工继续提交。SLA 提交及内容始终由人工确认。
  x-api-status: DRAFT
  x-owner: API 负责人
  x-last-reviewed: '2026-07-15'
  x-source-of-truth-for: DRAFT API v2 HTTP 契约及 operation 级实施状态
  x-implementation-status: PARTIALLY_IMPLEMENTED
  x-phase-implementation-readiness: READY_FOR_IMPLEMENTATION
  x-approval-status: APPROVED_FOR_IMPLEMENTATION
  x-current-implementation: V1_MOCK_PLUS_V2_AUTH_SESSION
  x-approved-on: '2026-07-14'
  x-approved-by-roles: [API 负责人, 产品负责人, 安全负责人]
  x-approval-source: 用户当前明确指令
  x-scope: PHASE_1_LOCAL_SIMULATION_ONLY
servers:
  - url: /api/v2
    description: 相对路径；不声明真实服务地址
tags:
  - { name: AuthSession, description: 本地预置模拟身份会话 }
  - { name: KnowledgeDocument, description: 知识文档及不可变原始文件 }
  - { name: KnowledgeVersion, description: 知识版本与显式治理命令 }
  - { name: ParseTask, description: 不可变解析任务 }
  - { name: IndexTask, description: 不可变双索引任务 }
  - { name: Evidence, description: 每次读取重新授权的受控依据 }
  - { name: PrecheckSession, description: 预诊 Session 与最多三次 Run }
  - { name: Feedback, description: 独立反馈命令 }
  - { name: SubmissionContinuation, description: 独立模拟继续提交确认 }
  - { name: EvaluationRun, description: 固定模拟评估集运行 }
  - { name: Metrics, description: 权限过滤后的聚合指标 }
  - { name: AuditEvent, description: 不含业务正文的结构化审计 }
  - { name: CompletenessPolicy, description: 版本化完整度策略只读视图 }
  - { name: AdminReset, description: 仅本地环境的受控异步重置 }
security:
  - CookieAuth: []
paths:
  /auth-sessions:
    post:
      tags: [AuthSession]
      operationId: createAuthSession
      x-implementation-status: IMPLEMENTED
      summary: 使用预置模拟身份建立本地会话
      description: |
        仅限本地模拟环境；不提供注册、JWT、SSO 或真实组织同步。成功时创建绑定该 Session 的高熵
        CSRF Token，并仅通过 `X-CSRF-Token` 响应头发放；Token 不进入 JSON、可读 Cookie 或 localStorage。
        新建、切换模拟身份或替换 Session 时生成新 Token，旧 Session 与 Token 立即失效。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAuthSessionRequest' }
            example: { userCode: mock-precheck-user, mockData: true }
      responses:
        '201':
          description: 模拟会话已建立
          headers:
            Set-Cookie: { schema: { type: string }, description: HttpOnly、SameSite Cookie }
            X-CSRF-Token: { $ref: '#/components/headers/CsrfToken' }
            Cache-Control: { $ref: '#/components/headers/NoStore' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSession' }
              example: { sessionId: 11111111-1111-4111-8111-111111111111, userCode: mock-precheck-user, displayName: 预诊用户（模拟数据）, roles: [PRECHECK_USER], productLineCodes: [TDH], expiresAt: '2026-07-14T10:00:00Z', mockData: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /auth-sessions/current:
    get:
      tags: [AuthSession]
      operationId: getCurrentAuthSession
      x-implementation-status: IMPLEMENTED
      summary: 查询当前本地会话
      description: |
        返回当前 Session 绑定的 CSRF Token，供页面刷新后恢复内存状态；同一 Session 内只返回而不轮换。
        响应不得被缓存，Token 不进入 JSON、可读 Cookie 或 localStorage。
      responses:
        '200': { $ref: '#/components/responses/AuthSessionOk' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    delete:
      tags: [AuthSession]
      operationId: deleteCurrentAuthSession
      x-implementation-status: IMPLEMENTED
      summary: 退出当前本地会话
      description: |
        成功时原子失效当前 Session 与其 CSRF Token。缺失、未知、已退出或过期 Session 返回
        `401 UNAUTHENTICATED`；有效 Session 下 Token 缺失、为空、不匹配或属于其他 Session 返回
        `403 CSRF_VALIDATION_FAILED`；身份权限不足返回 `403 INSUFFICIENT_ROLE`。
      security: [{ CookieAuth: [], CsrfToken: [] }]
      responses:
        '204': { description: 会话已删除 }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/CsrfValidationFailed' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /knowledge-documents:
    post:
      tags: [KnowledgeDocument]
      operationId: createKnowledgeDocument
      x-implementation-status: NOT_IMPLEMENTED
      summary: 上传不可变原始知识文件并创建草稿版本
      description: 仅接受 Markdown、TXT、文本型 PDF；原始字节上限依次为 5 MB、5 MB、20 MB，持久化前校验。成功时同时创建 ParseTask。
      security: [{ CookieAuth: [], CsrfToken: [] }]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/CreateKnowledgeDocumentRequest' }
            encoding:
              metadata: { contentType: application/json }
              file: { contentType: 'text/markdown, text/plain, application/pdf' }
      responses:
        '201':
          description: 文档、草稿版本和解析任务已创建
          headers: { Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeDocumentCreated' }
              example:
                document: { documentId: 22222222-2222-4222-8222-222222222222, title: TDH 排查手册（模拟数据）, productLine: { code: TDH, displayName: TDH（模拟数据） }, currentPublishedVersionId: null, createdAt: '2026-07-14T08:00:00Z', mockData: true }
                version: { versionId: 33333333-3333-4333-8333-333333333333, documentId: 22222222-2222-4222-8222-222222222222, revisionNumber: 1, status: DRAFT, submittedBy: null, approvedBy: null, createdAt: '2026-07-14T08:00:00Z', updatedAt: '2026-07-14T08:00:00Z', mockData: true }
                parseTask: { taskId: 44444444-4444-4444-8444-444444444444, resourceId: 33333333-3333-4333-8333-333333333333, status: PENDING, attempt: 0, maxAttempts: 3, error: null, nextRetryAt: null, createdAt: '2026-07-14T08:00:00Z', startedAt: null, completedAt: null, mockData: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/CookieWriteForbidden' }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '413': { $ref: '#/components/responses/FileLimitError' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    get:
      tags: [KnowledgeDocument]
      operationId: listKnowledgeDocuments
      x-implementation-status: NOT_IMPLEMENTED
      summary: 分页查询有权查看的知识文档
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/SortDirection' }
        - { name: sortBy, in: query, schema: { type: string, enum: [createdAt, title], default: createdAt } }
        - { name: productLineCode, in: query, schema: { type: string } }
      responses:
        '200': { $ref: '#/components/responses/KnowledgeDocumentPageOk' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-documents/{documentId}:
    parameters: [{ $ref: '#/components/parameters/DocumentId' }]
    get:
      tags: [KnowledgeDocument]
      operationId: getKnowledgeDocument
      x-implementation-status: NOT_IMPLEMENTED
      summary: 查询知识文档
      responses:
        '200': { $ref: '#/components/responses/KnowledgeDocumentOk' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

  /knowledge-versions:
    post:
      tags: [KnowledgeVersion]
      operationId: createKnowledgeVersion
      x-implementation-status: NOT_IMPLEMENTED
      summary: 为已发布文档上传新原始文件并创建新草稿版本
      description: 不原地修改已发布版本；成功时创建新 ParseTask。文件限制与首次上传一致。
      security: [{ CookieAuth: [], CsrfToken: [] }]
      parameters: [{ $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/CreateKnowledgeVersionRequest' }
            encoding:
              metadata: { contentType: application/json }
              file: { contentType: 'text/markdown, text/plain, application/pdf' }
      responses:
        '201': { $ref: '#/components/responses/KnowledgeVersionCreated' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/CookieWriteForbidden' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '409': { $ref: '#/components/responses/IdempotencyOrStateConflict' }
        '413': { $ref: '#/components/responses/FileLimitError' }
        '415': { $ref: '#/components/responses/UnsupportedMediaType' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    get:
      tags: [KnowledgeVersion]
      operationId: listKnowledgeVersions
      x-implementation-status: NOT_IMPLEMENTED
      summary: 分页查询知识版本
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/SortDirection' }
        - { name: sortBy, in: query, schema: { type: string, enum: [createdAt, updatedAt, status], default: createdAt } }
        - { name: documentId, in: query, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/KnowledgeVersionStatus' } }
      responses:
        '200': { $ref: '#/components/responses/KnowledgeVersionPageOk' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-versions/{versionId}:
    parameters: [{ $ref: '#/components/parameters/VersionId' }]
    get:
      tags: [KnowledgeVersion]
      operationId: getKnowledgeVersion
      x-implementation-status: NOT_IMPLEMENTED
      summary: 查询不可变知识版本
      responses:
        '200': { $ref: '#/components/responses/KnowledgeVersionOk' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-versions/{versionId}/parse-preview:
    parameters: [{ $ref: '#/components/parameters/VersionId' }]
    get:
      tags: [ParseTask]
      operationId: getKnowledgeVersionParsePreview
      x-implementation-status: NOT_IMPLEMENTED
      summary: 查询知识版本的解析预览摘要
      description: |
        `KNOWLEDGE_EDITOR` 仅可读取本人创建或提交且在本人产品线范围内的版本；
        `KNOWLEDGE_REVIEWER` 仅可读取本人产品线范围内已进入 `IN_REVIEW` 及后续状态的版本。
        `ADMIN` 不因管理员身份自动获得正文预览权限。每次读取重新校验当前角色、产品线和对象可见性。
        解析成功且存在警告仍返回 `SUCCEEDED` 与非空 `warnings`，不引入 `SUCCEEDED_WITH_WARNINGS`。
      responses:
        '200': { $ref: '#/components/responses/ParsePreviewOk' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '409': { $ref: '#/components/responses/ParsePreviewConflict' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-versions/{versionId}/parse-preview/blocks:
    parameters: [{ $ref: '#/components/parameters/VersionId' }]
    get:
      tags: [ParseTask]
      operationId: listKnowledgeVersionParsedBlocks
      x-implementation-status: NOT_IMPLEMENTED
      summary: 按解析顺序分页查询规范化文本块
      description: 与预览摘要执行相同的角色、产品线和对象可见性校验；固定按 `sequence ASC` 返回，不支持任意排序，不在单个响应中返回整个文件。
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
      responses:
        '200': { $ref: '#/components/responses/ParsedBlockPageOk' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '409': { $ref: '#/components/responses/ParsePreviewConflict' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-versions/{versionId}/parse-preview/chunks:
    parameters: [{ $ref: '#/components/parameters/VersionId' }]
    get:
      tags: [ParseTask]
      operationId: listKnowledgeVersionChunkPreviews
      x-implementation-status: NOT_IMPLEMENTED
      summary: 按切片顺序分页查询结构化 Chunk 预览
      description: 与预览摘要执行相同的角色、产品线和对象可见性校验；固定按 `sequence ASC` 返回，文本块与 Chunk 独立分页，不支持任意排序。
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
      responses:
        '200': { $ref: '#/components/responses/ChunkPreviewPageOk' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '409': { $ref: '#/components/responses/ParsePreviewConflict' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-versions/{versionId}/revisions:
    post:
      tags: [KnowledgeVersion]
      operationId: createKnowledgeDraftRevision
      x-implementation-status: NOT_IMPLEMENTED
      summary: 创建新的草稿修订并使旧 Chunk/索引失效
      security: [{ CookieAuth: [], CsrfToken: [] }]
      parameters:
        - { $ref: '#/components/parameters/VersionId' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/CreateKnowledgeRevisionRequest' }
            encoding: { revision: { contentType: application/json } }
      responses:
        '201': { $ref: '#/components/responses/KnowledgeRevisionCreated' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/CookieWriteForbidden' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '409': { $ref: '#/components/responses/IdempotencyOrStateConflict' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-versions/{versionId}/review-submissions:
    post:
      tags: [KnowledgeVersion]
      operationId: submitKnowledgeVersionForReview
      x-implementation-status: NOT_IMPLEMENTED
      summary: 提交知识版本审核
      description: |
        `parseResultHash` 必须匹配当前 `SUCCEEDED` 解析结果，否则返回 `409 ILLEGAL_STATE_TRANSITION`。
      security: [{ CookieAuth: [], CsrfToken: [] }]
      parameters: [{ $ref: '#/components/parameters/VersionId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { $ref: '#/components/requestBodies/ReviewSubmission' }
      responses: { '200': { $ref: '#/components/responses/KnowledgeVersionReviewSubmitted' }, '400': { $ref: '#/components/responses/ValidationError' }, '401': { $ref: '#/components/responses/Unauthenticated' }, '403': { $ref: '#/components/responses/CookieWriteForbidden' }, '404': { $ref: '#/components/responses/SafeNotFound' }, '409': { $ref: '#/components/responses/IdempotencyOrStateConflict' }, '503': { $ref: '#/components/responses/ServiceUnavailable' } }
  /knowledge-versions/{versionId}/draft-returns:
    post:
      tags: [KnowledgeVersion]
      operationId: returnKnowledgeVersionToDraft
      x-implementation-status: NOT_IMPLEMENTED
      summary: 将审核中版本退回草稿
      security: [{ CookieAuth: [], CsrfToken: [] }]
      parameters: [{ $ref: '#/components/parameters/VersionId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { $ref: '#/components/requestBodies/RequiredCommandReason' }
      responses: { '200': { $ref: '#/components/responses/KnowledgeVersionReturnedToDraft' }, '400': { $ref: '#/components/responses/ValidationError' }, '401': { $ref: '#/components/responses/Unauthenticated' }, '403': { $ref: '#/components/responses/CookieWriteForbidden' }, '404': { $ref: '#/components/responses/SafeNotFound' }, '409': { $ref: '#/components/responses/IdempotencyOrStateConflict' }, '503': { $ref: '#/components/responses/ServiceUnavailable' } }
  /knowledge-versions/{versionId}/approvals:
    post:
      tags: [KnowledgeVersion]
      operationId: approveKnowledgeVersion
      x-implementation-status: NOT_IMPLEMENTED
      summary: 由不同身份的审核人批准知识版本
      description: |
        提交人不得批准本人提交的版本；ADMIN 不获得绕过能力。`parseResultHash` 必须匹配当前解析结果；
        有警告时 `acknowledgedWarningCodes` 必须完整覆盖当前稳定警告码集合，无警告时允许空数组。
        缺失或过期确认返回 `409 ILLEGAL_STATE_TRANSITION`。审计只保存哈希、警告码、审核主体和时间，
        不复制解析正文；警告确认不构成自动批准。
      security: [{ CookieAuth: [], CsrfToken: [] }]
      parameters: [{ $ref: '#/components/parameters/VersionId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { $ref: '#/components/requestBodies/KnowledgeApproval' }
      responses:
        '200': { $ref: '#/components/responses/KnowledgeVersionApproved' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/KnowledgeReviewForbidden' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '409': { $ref: '#/components/responses/IdempotencyOrStateConflict' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-versions/{versionId}/publications:
    post:
      tags: [KnowledgeVersion]
      operationId: publishKnowledgeVersion
      x-implementation-status: NOT_IMPLEMENTED
      summary: 创建双索引发布任务
      description: 仅 APPROVED 可执行；FTS 与向量索引均成功后才原子发布并废弃旧版，半索引版本不可检索。
      security: [{ CookieAuth: [], CsrfToken: [] }]
      parameters: [{ $ref: '#/components/parameters/VersionId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { $ref: '#/components/requestBodies/CommandReason' }
      responses:
        '202': { $ref: '#/components/responses/IndexTaskAccepted' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/KnowledgeReviewForbidden' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '409': { $ref: '#/components/responses/IdempotencyOrStateConflict' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /knowledge-versions/{versionId}/deprecations:
    post:
      tags: [KnowledgeVersion]
      operationId: deprecateKnowledgeVersion
      x-implementation-status: NOT_IMPLEMENTED
      summary: 废弃知识版本
      security: [{ CookieAuth: [], CsrfToken: [] }]
      parameters: [{ $ref: '#/components/parameters/VersionId' }, { $ref: '#/components/parameters/IdempotencyKey' }]
      requestBody: { $ref: '#/components/requestBodies/RequiredCommandReason' }
      responses: { '200': { $ref: '#/components/responses/KnowledgeVersionDeprecated' }, '400': { $ref: '#/components/responses/ValidationError' }, '401': { $ref: '#/components/responses/Unauthenticated' }, '403': { $ref: '#/components/responses/CookieWriteForbidden' }, '404': { $ref: '#/components/responses/SafeNotFound' }, '409': { $ref: '#/components/responses/IdempotencyOrStateConflict' }, '503': { $ref: '#/components/responses/ServiceUnavailable' } }

  /parse-tasks:
    get:
      tags: [ParseTask]
