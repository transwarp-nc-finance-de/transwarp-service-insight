            example: { environmentCode: LOCAL, confirmationPhrase: RESET LOCAL MOCK DATA, reason: 模拟数据：恢复演示初始状态 }
      responses:
        '202': { $ref: '#/components/responses/AdminResetAccepted' }
        '200': { $ref: '#/components/responses/AdminResetReplayed' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/CookieWriteForbidden' }
        '409': { $ref: '#/components/responses/IdempotencyConflict' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
    get:
      tags: [AdminReset]
      operationId: listAdminResets
      x-implementation-status: NOT_IMPLEMENTED
      summary: 分页查询本地重置任务
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { $ref: '#/components/parameters/SortDirection' }
        - { name: sortBy, in: query, schema: { type: string, enum: [createdAt, status], default: createdAt } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/TaskStatus' } }
      responses:
        '200': { $ref: '#/components/responses/AdminResetPageOk' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /admin/resets/{resetId}:
    parameters: [{ $ref: '#/components/parameters/ResetId' }]
    get:
      tags: [AdminReset]
      operationId: getAdminReset
      x-implementation-status: NOT_IMPLEMENTED
      summary: 查询本地重置任务
      responses:
        '200': { $ref: '#/components/responses/AdminResetOk' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '404': { $ref: '#/components/responses/SafeNotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: SESSION
      description: |
        仅本地预置模拟身份的服务端会话 Cookie。Session 过期、退出、身份切换或被替换时立即失效；
        与其绑定的 CSRF Token 同步失效。Session 与 Token 均不得跨模拟身份重用。
    CsrfToken:
      type: apiKey
      in: header
      name: X-CSRF-Token
      description: |
        所有 Cookie 会话写操作必须携带。Token 是绑定单个服务端 Session 的高熵随机值，同一 Session 内稳定且
        不按请求滚动轮换；通过登录 `201` 首次发放，通过 current `200` 恢复。新建、切换身份或替换 Session
        时生成新 Token；退出或会话过期时同步失效。一期不提供独立刷新端点，需要换 Token 时重新建立模拟会话。
        Token 只允许保存在浏览器内存中，不得进入 JSON、可读 Cookie、localStorage、safeDetails、日志或审计。
  parameters:
    Page: { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 }, description: 1 起始页码 }
    Size: { name: size, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
    SortDirection: { name: sortDirection, in: query, schema: { type: string, enum: [ASC, DESC], default: DESC } }
    IdempotencyKey: { name: Idempotency-Key, in: header, required: true, schema: { type: string, minLength: 8, maxLength: 128 }, description: 调用方生成；与请求语义哈希共同约束重放 }
    DocumentId: { name: documentId, in: path, required: true, schema: { type: string, format: uuid } }
    VersionId: { name: versionId, in: path, required: true, schema: { type: string, format: uuid } }
    TaskId: { name: taskId, in: path, required: true, schema: { type: string, format: uuid } }
    EvidenceId: { name: evidenceId, in: path, required: true, schema: { type: string, format: uuid } }
    SessionId: { name: sessionId, in: path, required: true, schema: { type: string, format: uuid } }
    RunId: { name: runId, in: path, required: true, schema: { type: string, format: uuid } }
    FeedbackId: { name: feedbackId, in: path, required: true, schema: { type: string, format: uuid } }
    ContinuationId: { name: continuationId, in: path, required: true, schema: { type: string, format: uuid } }
    EventId: { name: eventId, in: path, required: true, schema: { type: string, format: uuid } }
    PolicyVersion: { name: policyVersion, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 64 } }
    ResetId: { name: resetId, in: path, required: true, schema: { type: string, format: uuid } }
  headers:
    IdempotencyReplayed: { description: 是否返回既有成功结果, schema: { type: boolean } }
    CsrfToken:
      description: 当前服务端 Session 绑定的 CSRF Token；仅供浏览器保存在内存中
      schema: { type: string, minLength: 32 }
    NoStore:
      description: 认证会话与 CSRF Token 响应不得缓存
      schema: { type: string, enum: [no-store] }
  requestBodies:
    CommandReason:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/CommandReason' } } }
    RequiredCommandReason:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/RequiredCommandReason' } } }
    ReviewSubmission:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/ReviewSubmissionRequest' } } }
    KnowledgeApproval:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/KnowledgeApprovalRequest' } } }
    ConfirmationReason:
      required: true
      content: { application/json: { schema: { $ref: '#/components/schemas/ConfirmationReason' } } }
  schemas:
    ApiError:
      type: object
      additionalProperties: false
      required: [code, message, requestId, timestamp, fieldErrors, retryable, safeDetails]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, UNAUTHENTICATED, INSUFFICIENT_ROLE, RESOURCE_NOT_FOUND, DUTY_SEPARATION_VIOLATION, ILLEGAL_STATE_TRANSITION, IDEMPOTENCY_KEY_CONFLICT, IDEMPOTENCY_CONTEXT_CONFLICT, NEW_SESSION_REQUIRED, RUN_LIMIT_REACHED, FILE_TOO_LARGE, UNSUPPORTED_FILE_TYPE, PDF_TEXT_LAYER_REQUIRED, SERVICE_UNAVAILABLE, TASK_FAILED, PARSE_PREVIEW_NOT_READY, CSRF_VALIDATION_FAILED, LOCAL_ENVIRONMENT_REQUIRED]
        message: { type: string, description: 可安全展示的信息 }
        requestId: { type: string, format: uuid }
        timestamp: { type: string, format: date-time }
        fieldErrors: { type: array, items: { $ref: '#/components/schemas/FieldError' } }
        retryable: { type: boolean }
        safeDetails: { type: object, additionalProperties: true, description: 不含正文、路径、堆栈、Token 或越权资源信息 }
    FieldError:
      type: object
      additionalProperties: false
      required: [field, code, message]
      properties:
        field: { type: string }
        code: { type: string }
        message: { type: string }
    PageMetadata:
      type: object
      additionalProperties: false
      required: [page, size, totalItems, totalPages, sortBy, sortDirection]
      properties:
        page: { type: integer, minimum: 1 }
        size: { type: integer, minimum: 1, maximum: 100 }
        totalItems: { type: integer, format: int64, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
        sortBy: { type: string }
        sortDirection: { type: string, enum: [ASC, DESC] }
    CatalogValue:
      type: object
      additionalProperties: false
      required: [code, displayName]
      properties:
        code: { type: string, minLength: 1, maxLength: 100 }
        displayName: { type: string, minLength: 1, maxLength: 200 }
    IssueTypeCode: { type: string, enum: [FUNCTIONAL_FAILURE, PERFORMANCE_DEGRADATION, INSTALLATION_CONFIGURATION, DATA_CORRECTNESS] }
    IssueTypeValue:
      allOf:
        - { $ref: '#/components/schemas/CatalogValue' }
        - type: object
          properties: { code: { $ref: '#/components/schemas/IssueTypeCode' } }
    Role: { type: string, enum: [PRECHECK_USER, KNOWLEDGE_EDITOR, KNOWLEDGE_REVIEWER, ADMIN] }
    AuthSession:
      type: object
      additionalProperties: false
      required: [sessionId, userCode, displayName, roles, productLineCodes, expiresAt, mockData]
      properties:
        sessionId: { type: string, format: uuid }
        userCode: { type: string }
        displayName: { type: string }
        roles: { type: array, minItems: 1, uniqueItems: true, items: { $ref: '#/components/schemas/Role' } }
        productLineCodes: { type: array, uniqueItems: true, items: { type: string } }
        expiresAt: { type: string, format: date-time }
        mockData: { type: boolean, enum: [true] }
    CreateAuthSessionRequest:
      type: object
      additionalProperties: false
      required: [userCode, mockData]
      properties:
        userCode: { type: string, minLength: 1, maxLength: 100 }
        mockData: { type: boolean, enum: [true] }

    KnowledgeDocument:
      type: object
      additionalProperties: false
      required: [documentId, title, productLine, currentPublishedVersionId, createdAt, mockData]
      properties:
        documentId: { type: string, format: uuid }
        title: { type: string }
        productLine: { $ref: '#/components/schemas/CatalogValue' }
        currentPublishedVersionId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        mockData: { type: boolean, enum: [true] }
    KnowledgeDocumentMetadata:
      type: object
      additionalProperties: false
      required: [title, productLine, sourceType, mockData]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        productLine: { $ref: '#/components/schemas/CatalogValue' }
        sourceType: { type: string, enum: [PRODUCT_MANUAL, TRAINING_MATERIAL, USER_MANUAL, OPEN_SOURCE_REFERENCE, MOCK] }
        mockData: { type: boolean, enum: [true] }
    CreateKnowledgeDocumentRequest:
      type: object
      additionalProperties: false
      required: [metadata, file]
      properties:
        metadata: { $ref: '#/components/schemas/KnowledgeDocumentMetadata' }
        file: { type: string, format: binary, description: Markdown/TXT 最大 5242880 字节；文本型 PDF 最大 20971520 字节 }
    CreateKnowledgeVersionMetadata:
      type: object
      additionalProperties: false
      required: [documentId, note, mockData]
      properties:
        documentId: { type: string, format: uuid }
        note: { type: string, maxLength: 1000 }
        mockData: { type: boolean, enum: [true] }
    CreateKnowledgeVersionRequest:
      type: object
      additionalProperties: false
      required: [metadata, file]
      properties:
        metadata: { $ref: '#/components/schemas/CreateKnowledgeVersionMetadata' }
        file: { type: string, format: binary, description: Markdown/TXT 最大 5242880 字节；文本型 PDF 最大 20971520 字节 }
    KnowledgeVersionStatus: { type: string, enum: [DRAFT, IN_REVIEW, APPROVED, PUBLISHED, DEPRECATED] }
    KnowledgeVersion:
      type: object
      additionalProperties: false
      required: [versionId, documentId, revisionNumber, status, submittedBy, approvedBy, createdAt, updatedAt, mockData]
      properties:
        versionId: { type: string, format: uuid }
        documentId: { type: string, format: uuid }
        revisionNumber: { type: integer, minimum: 1 }
        status: { $ref: '#/components/schemas/KnowledgeVersionStatus' }
        submittedBy: { type: string, nullable: true }
        approvedBy: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        mockData: { type: boolean, enum: [true] }
    KnowledgeDraftRevision:
      type: object
      additionalProperties: false
      required: [revisionId, versionId, revisionNumber, title, productLine, cleanedTextHash, parseWarningNotes, createdAt, mockData]
      properties:
        revisionId: { type: string, format: uuid }
        versionId: { type: string, format: uuid }
        revisionNumber: { type: integer, minimum: 1 }
        title: { type: string }
        productLine: { $ref: '#/components/schemas/CatalogValue' }
        cleanedTextHash: { type: string, pattern: '^sha256:' }
        parseWarningNotes: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }
        mockData: { type: boolean, enum: [true] }
    KnowledgeRevisionInput:
      type: object
      additionalProperties: false
      required: [title, productLine, cleanedText, parseWarningNotes]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        productLine: { $ref: '#/components/schemas/CatalogValue' }
        cleanedText: { type: string, minLength: 1, maxLength: 5000000 }
        parseWarningNotes: { type: array, maxItems: 100, items: { type: string, maxLength: 1000 } }
    CreateKnowledgeRevisionRequest:
      type: object
      additionalProperties: false
      required: [revision]
      properties: { revision: { $ref: '#/components/schemas/KnowledgeRevisionInput' } }
    KnowledgeDocumentCreated:
      type: object
      additionalProperties: false
      required: [document, version, parseTask]
      properties:
        document: { $ref: '#/components/schemas/KnowledgeDocument' }
        version: { $ref: '#/components/schemas/KnowledgeVersion' }
        parseTask: { $ref: '#/components/schemas/ParseTask' }
    KnowledgeVersionCreatedBody:
      type: object
      additionalProperties: false
      required: [version, parseTask]
      properties:
        version: { $ref: '#/components/schemas/KnowledgeVersion' }
        parseTask: { $ref: '#/components/schemas/ParseTask' }
    KnowledgeRevisionCreatedBody:
      type: object
      additionalProperties: false
      required: [revision, parseTask]
      properties:
        revision: { $ref: '#/components/schemas/KnowledgeDraftRevision' }
        parseTask: { $ref: '#/components/schemas/ParseTask' }
    KnowledgeVersionCommandResult:
      type: object
      additionalProperties: false
      required: [version, auditEventId]
      properties:
        version: { $ref: '#/components/schemas/KnowledgeVersion' }
        auditEventId: { type: string, format: uuid }
    ReviewSubmissionRequest:
      type: object
      additionalProperties: false
      required: [parseResultHash]
      properties:
        parseResultHash: { $ref: '#/components/schemas/Sha256Hash' }
        reason: { type: string, maxLength: 1000 }
    KnowledgeApprovalRequest:
      type: object
      additionalProperties: false
      required: [parseResultHash, acknowledgedWarningCodes]
      properties:
        parseResultHash: { $ref: '#/components/schemas/Sha256Hash' }
        acknowledgedWarningCodes:
          type: array
          maxItems: 4
          uniqueItems: true
          items: { $ref: '#/components/schemas/ParseWarningCode' }
        reason: { type: string, maxLength: 1000 }
    CommandReason:
      type: object
      additionalProperties: false
      properties: { reason: { type: string, maxLength: 1000 } }
    RequiredCommandReason:
      type: object
      additionalProperties: false
      required: [reason]
      properties: { reason: { type: string, minLength: 1, maxLength: 1000 } }
    ConfirmationReason:
      type: object
      additionalProperties: false
      required: [confirmed, reason]
      properties:
        confirmed: { type: boolean, enum: [true] }
        reason: { type: string, minLength: 1, maxLength: 1000 }

    TaskStatus: { type: string, enum: [PENDING, RUNNING, SUCCEEDED, FAILED] }
    Sha256Hash:
      type: string
      pattern: '^sha256:[a-f0-9]{64}$'
      description: 小写十六进制 SHA-256 摘要，包含 `sha256:` 前缀
    ParseWarningCode:
      type: string
      enum: [IMAGE_CONTENT_IGNORED, TABLE_STRUCTURE_FLATTENED, READING_ORDER_UNCERTAIN, CONTENT_LOSS_SUSPECTED]
    ParseWarning:
      type: object
      additionalProperties: false
      required: [code, message, occurrenceCount]
      properties:
        code: { $ref: '#/components/schemas/ParseWarningCode' }
        message: { type: string, minLength: 1, maxLength: 1000, description: 不含宿主路径、文件 URL、堆栈或原始字节的安全描述 }
        structurePath: { type: string, minLength: 1, maxLength: 1000, description: 可选的规范化文档结构路径 }
        occurrenceCount: { type: integer, minimum: 1 }
    ChunkingRule:
      type: object
      additionalProperties: false
      required: [version, strategy, maxTokens, overlapTokens]
      properties:
        version: { type: string, minLength: 1, maxLength: 64 }
        strategy: { type: string, enum: [STRUCTURE_FIRST] }
        maxTokens: { type: integer, enum: [400] }
        overlapTokens: { type: integer, enum: [50] }
    ParsePreview:
      type: object
      additionalProperties: false
      required: [versionId, parseTaskId, parseStatus, parserVersion, parseResultHash, parsedBlockCount, chunkCount, warnings, chunkingRule, mockData]
      properties:
        versionId: { type: string, format: uuid }
        parseTaskId: { type: string, format: uuid }
        parseStatus: { type: string, enum: [SUCCEEDED], description: 有警告时仍为 SUCCEEDED }
        parserVersion: { type: string, minLength: 1, maxLength: 64 }
        parseResultHash:
          allOf: [{ $ref: '#/components/schemas/Sha256Hash' }]
          description: 绑定当前解析结果、聚合警告集合、解析器版本和结构顺序；新草稿修订或重新解析后变化
        parsedBlockCount: { type: integer, format: int64, minimum: 0 }
        chunkCount: { type: integer, format: int64, minimum: 0 }
        warnings: { type: array, maxItems: 100, items: { $ref: '#/components/schemas/ParseWarning' } }
        chunkingRule: { $ref: '#/components/schemas/ChunkingRule' }
        mockData: { type: boolean, enum: [true] }
    ParsedBlock:
      type: object
      additionalProperties: false
      required: [blockId, sequence, structurePath, text, contentHash]
      properties:
        blockId: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        structurePath: { type: string, minLength: 1, maxLength: 1000 }
        text: { type: string, minLength: 1, maxLength: 5000000 }
        contentHash:
          allOf: [{ $ref: '#/components/schemas/Sha256Hash' }]
          description: 规范化文本块内容的 SHA-256
    ChunkPreview:
      type: object
      additionalProperties: false
      required: [chunkId, sequence, structurePath, text, tokenCount, contentHash, chunkingRuleVersion]
      properties:
        chunkId: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        structurePath: { type: string, minLength: 1, maxLength: 1000 }
        text: { type: string, minLength: 1, maxLength: 5000000 }
        tokenCount: { type: integer, minimum: 1, maximum: 400 }
        contentHash:
          allOf: [{ $ref: '#/components/schemas/Sha256Hash' }]
          description: 规范化 Chunk 内容的 SHA-256
        chunkingRuleVersion: { type: string, minLength: 1, maxLength: 64 }
    ParsePreviewPageMetadata:
      type: object
      additionalProperties: false
      required: [page, size, totalItems, totalPages, sortBy, sortDirection]
      properties:
        page: { type: integer, minimum: 1 }
        size: { type: integer, minimum: 1, maximum: 100 }
        totalItems: { type: integer, format: int64, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
        sortBy: { type: string, enum: [sequence] }
        sortDirection: { type: string, enum: [ASC] }
    ParsedBlockPage:
      type: object
      additionalProperties: false
      required: [items, page]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ParsedBlock' } }
        page: { $ref: '#/components/schemas/ParsePreviewPageMetadata' }
    ChunkPreviewPage:
      type: object
      additionalProperties: false
      required: [items, page]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ChunkPreview' } }
        page: { $ref: '#/components/schemas/ParsePreviewPageMetadata' }
    TaskError:
      type: object
      additionalProperties: false
      required: [code, message, retryable]
      properties:
        code: { type: string }
        message: { type: string }
        retryable: { type: boolean }
    TaskBase:
      type: object
      required: [taskId, resourceId, status, attempt, maxAttempts, error, nextRetryAt, createdAt, startedAt, completedAt, mockData]
      properties:
        taskId: { type: string, format: uuid }
        resourceId: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/TaskStatus' }
        attempt: { type: integer, minimum: 0, maximum: 3 }
        maxAttempts: { type: integer, enum: [3] }
        error: { allOf: [{ $ref: '#/components/schemas/TaskError' }], nullable: true }
        nextRetryAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
        mockData: { type: boolean, enum: [true] }
    ParseTask:
      description: 解析成功且存在警告时状态仍为 SUCCEEDED；聚合警告通过 parse-preview 读取，不增加 SUCCEEDED_WITH_WARNINGS。
      allOf: [{ $ref: '#/components/schemas/TaskBase' }]
    IndexTask:
      allOf:
        - { $ref: '#/components/schemas/TaskBase' }
        - type: object
          required: [ftsStatus, embeddingStatus]
          properties:
            ftsStatus: { $ref: '#/components/schemas/TaskStatus' }
            embeddingStatus: { $ref: '#/components/schemas/TaskStatus' }
    Evidence:
      type: object
      additionalProperties: false
      required: [evidenceId, document, versionId, chunkId, excerpt, contentHash, mockData]
      properties:
        evidenceId: { type: string, format: uuid }
        document:
          type: object
          additionalProperties: false
          required: [documentId, title]
          properties:
            documentId: { type: string, format: uuid }
            title: { type: string }
        versionId: { type: string, format: uuid }
        chunkId: { type: string, format: uuid }
        excerpt: { type: string, maxLength: 2000 }
        contentHash: { type: string, pattern: '^sha256:' }
        mockData: { type: boolean, enum: [true] }
    AdditionalInformationItem:
      type: object
      additionalProperties: false
      required: [fieldCode, displayName, value]
      properties:
        fieldCode: { type: string, minLength: 1, maxLength: 100 }
        displayName: { type: string, minLength: 1, maxLength: 200 }
        value: { type: string, maxLength: 10000 }
    AttachmentMetadata:
      type: object
      additionalProperties: false
      required: [attachmentId, fileName, mediaType, byteSize]
      properties:
        attachmentId: { type: string, minLength: 1, maxLength: 200, description: 不透明模拟附件 ID }
        fileName: { type: string, minLength: 1, maxLength: 255 }
        mediaType: { type: string, minLength: 1, maxLength: 100 }
        byteSize: { type: integer, format: int64, minimum: 0 }
    PrecheckContext:
      type: object
      additionalProperties: false
      required: [sourceSystem, hostRequestId, formSchemaVersion, issueType, productLine, title, descriptionPlainText]
      properties:
        sourceSystem: { type: string, enum: [AIOPS, SANDBOX] }
        hostRequestId: { type: string, minLength: 1, maxLength: 100 }
        formSchemaVersion: { type: string, minLength: 1, maxLength: 32 }
        issueType: { $ref: '#/components/schemas/IssueTypeValue' }
        productLine: { $ref: '#/components/schemas/CatalogValue' }
        product: { $ref: '#/components/schemas/CatalogValue' }
        component: { $ref: '#/components/schemas/CatalogValue' }
        version: { type: string, maxLength: 100 }
        severity: { $ref: '#/components/schemas/CatalogValue' }
        serviceType: { $ref: '#/components/schemas/CatalogValue' }
        title: { type: string, minLength: 1, maxLength: 200 }
        descriptionPlainText: { type: string, minLength: 1, maxLength: 10000 }
        additionalInformation: { type: array, maxItems: 100, default: [], items: { $ref: '#/components/schemas/AdditionalInformationItem' } }
        impactScope: { type: string, maxLength: 2000 }
        attachments: { type: array, maxItems: 20, default: [], items: { $ref: '#/components/schemas/AttachmentMetadata' } }
      description: |
        完整冻结字段快照。规范化哈希统一 Unicode/换行、去除字符串首尾空白，
        缺省的 additionalInformation/attachments 按空数组处理；两者分别按 fieldCode/value、
        attachmentId/元数据稳定排序。
        目录 displayName 不入语义哈希；未知补充编码保留且入哈希，但不参与策略或权限判断。
    CreatePrecheckSessionRequest:
      type: object
      additionalProperties: false
      required: [context]
      properties: { context: { $ref: '#/components/schemas/PrecheckContext' } }
    CreatePrecheckRunRequest:
      type: object
      additionalProperties: false
      required: [context]
      properties: { context: { $ref: '#/components/schemas/PrecheckContext' } }
    SessionStatus: { type: string, enum: [ACTIVE, TERMINATED] }
    SessionTerminationReason: { type: string, enum: [CONTINUED_SUBMISSION, SELF_SERVICE_CONFIRMED] }
    RunStatus: { type: string, enum: [RECEIVED, VALIDATED, COMPLETED, NEED_MORE_INFORMATION, DEGRADED, FAILED, CANCELLED] }
    AllowedAction: { type: string, enum: [SUPPLEMENT_INFORMATION, CONTINUE_SUBMISSION, CONFIRM_SELF_SERVICE] }
    ConfidenceLevel: { type: string, enum: [HIGH, MEDIUM, LOW] }
    RetrievalMode: { type: string, enum: [HYBRID, FTS_ONLY, UNAVAILABLE] }
    CapabilityStatus:
      type: object
      additionalProperties: false
      required: [available, code, message]
      properties:
        available: { type: boolean }
        code: { type: string }
        message: { type: string }
    RetrievalDegradation:
      type: object
      additionalProperties: false
      required: [mode, fts, embedding, degraded]
      properties:
        mode: { $ref: '#/components/schemas/RetrievalMode' }
        fts: { $ref: '#/components/schemas/CapabilityStatus' }
        embedding: { $ref: '#/components/schemas/CapabilityStatus' }
        degraded: { type: boolean }
      description: Embedding 故障进入 FTS_ONLY；FTS 不可用且无已确认替代路径时为 UNAVAILABLE，并返回无证据结果。
    CompletenessAssessment:
      type: object
      additionalProperties: false
      required: [complete, policyVersion, missingFieldCodes, reasons]
      properties:
        complete: { type: boolean }
        policyVersion: { type: string }
        missingFieldCodes: { type: array, uniqueItems: true, items: { type: string } }
        reasons: { type: array, items: { type: string } }
      description: 仅提供补充建议，不是继续提交门禁。
    EvidenceReference:
      type: object
      additionalProperties: false
      required: [evidenceId, title, excerpt, mockData]
      properties:
        evidenceId: { type: string, format: uuid }
        title: { type: string }
        excerpt: { type: string, maxLength: 500 }
        mockData: { type: boolean, enum: [true] }
    PrecheckResult:
      type: object
      additionalProperties: false
      required: [summary, recommendations, completeness, confidence, confidenceReasons, evidence, humanInterventionAdvice, missingInformation, allowedActions, disclaimer, retrieval, mockData]
      properties:
        summary: { type: string }
        recommendations: { type: array, items: { type: string } }
        completeness: { $ref: '#/components/schemas/CompletenessAssessment' }
        confidence: { $ref: '#/components/schemas/ConfidenceLevel' }
        confidenceReasons: { type: array, minItems: 1, items: { type: string } }
        evidence: { type: array, items: { $ref: '#/components/schemas/EvidenceReference' } }
        humanInterventionAdvice: { type: array, minItems: 1, items: { type: string } }
        missingInformation: { type: array, items: { type: string } }
        allowedActions: { type: array, minItems: 1, uniqueItems: true, items: { $ref: '#/components/schemas/AllowedAction' } }
        disclaimer: { type: string, description: 必须说明非最终根因、最终方案或正式复盘结论 }
        retrieval: { $ref: '#/components/schemas/RetrievalDegradation' }
        mockData: { type: boolean, enum: [true] }
    PrecheckRun:
      type: object
      additionalProperties: false
      required: [runId, sessionId, sequence, status, contextSnapshot, result, createdAt, completedAt]
      properties:
        runId: { type: string, format: uuid }
        sessionId: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1, maximum: 3 }
        status: { $ref: '#/components/schemas/RunStatus' }
        contextSnapshot: { $ref: '#/components/schemas/PrecheckContext' }
        result: { $ref: '#/components/schemas/PrecheckResult' }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }
    PrecheckSession:
      type: object
      additionalProperties: false
      required: [sessionId, ownerUserCode, status, terminationReason, latestRun, runCount, maxRuns, createdAt, updatedAt, mockData]
      properties:
        sessionId: { type: string, format: uuid }
        ownerUserCode: { type: string }
        status: { $ref: '#/components/schemas/SessionStatus' }
        terminationReason: { allOf: [{ $ref: '#/components/schemas/SessionTerminationReason' }], nullable: true }
        latestRun: { $ref: '#/components/schemas/PrecheckRun' }
        runCount: { type: integer, minimum: 1, maximum: 3 }
        maxRuns: { type: integer, enum: [3] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        mockData: { type: boolean, enum: [true] }
    SessionTermination:
      type: object
      additionalProperties: false
      required: [sessionId, status, reason, terminatedAt, auditEventId, mockData]
      properties:
        sessionId: { type: string, format: uuid }
        status: { type: string, enum: [TERMINATED] }
        reason: { $ref: '#/components/schemas/SessionTerminationReason' }
        terminatedAt: { type: string, format: date-time }
        auditEventId: { type: string, format: uuid }
        mockData: { type: boolean, enum: [true] }

    AdoptionStatus: { type: string, enum: [ADOPTED, PARTIALLY_ADOPTED, IGNORED] }
    Helpfulness: { type: string, enum: [HELPFUL, NOT_HELPFUL] }
    CreateFeedbackRequest:
      type: object
      additionalProperties: false
      required: [sessionId, runId, adoptionStatus]
      properties:
        sessionId: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        adoptionStatus: { $ref: '#/components/schemas/AdoptionStatus' }
        helpfulness: { $ref: '#/components/schemas/Helpfulness' }
        reason: { type: string, maxLength: 2000 }
    Feedback:
      type: object
      additionalProperties: false
      required: [feedbackId, sessionId, runId, adoptionStatus, helpfulness, reason, recordedAt, mockData]
      properties:
        feedbackId: { type: string, format: uuid }
        sessionId: { type: string, format: uuid }
        runId: { type: string, format: uuid }
        adoptionStatus: { $ref: '#/components/schemas/AdoptionStatus' }
        helpfulness: { allOf: [{ $ref: '#/components/schemas/Helpfulness' }], nullable: true }
        reason: { type: string, nullable: true }
        recordedAt: { type: string, format: date-time }
        mockData: { type: boolean, enum: [true] }
    CreateSubmissionContinuationRequest:
      type: object
      additionalProperties: false
      required: [sessionId, confirmed]
      properties:
        sessionId: { type: string, format: uuid }
        confirmed: { type: boolean, enum: [true] }
        reason: { type: string, maxLength: 2000 }
    SubmissionContinuation:
      type: object
      additionalProperties: false
      required: [continuationId, sessionId, confirmedBy, confirmedAt, reason, auditEventId, mockData]
      properties:
        continuationId: { type: string, format: uuid }
        sessionId: { type: string, format: uuid }
        confirmedBy: { type: string }
        confirmedAt: { type: string, format: date-time }
        reason: { type: string, nullable: true }
        auditEventId: { type: string, format: uuid }
        mockData: { type: boolean, enum: [true] }
      description: 不含 ticketId、工单草稿或提交回执。

    CreateEvaluationRunRequest:
      type: object
      additionalProperties: false
      required: [evaluationSetVersion]
      properties:
        evaluationSetVersion: { type: string, minLength: 1, maxLength: 64 }
        note: { type: string, maxLength: 1000 }
    EvaluationSummary:
      type: object
      additionalProperties: false
      required: [sampleCount, permissionLeakageRate, citationErrorRate, degradationPassRate, recallAt5, disclaimer]
      properties:
        sampleCount: { type: integer, minimum: 0 }
        permissionLeakageRate: { type: number, minimum: 0, maximum: 1 }
        citationErrorRate: { type: number, minimum: 0, maximum: 1 }
        degradationPassRate: { type: number, minimum: 0, maximum: 1 }
        recallAt5: { type: number, minimum: 0, maximum: 1 }
        disclaimer: { type: string, enum: [小样本工程评估，不代表生产效果] }
    EvaluationRun:
      allOf:
        - { $ref: '#/components/schemas/TaskBase' }
        - type: object
          required: [evaluationSetVersion, summary]
          properties:
            evaluationSetVersion: { type: string }
            summary: { allOf: [{ $ref: '#/components/schemas/EvaluationSummary' }], nullable: true }
    Metrics:
      type: object
      additionalProperties: false
      required: [from, to, precheckCount, successRate, degradationRate, averageRunCount, informationSupplementRate, evidenceHitRate, adoptionRate, continuationRate, retrievalP95Ms, embeddingP95Ms, mockData]
      properties:
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        precheckCount: { type: integer, minimum: 0 }
        successRate: { type: number, minimum: 0, maximum: 1 }
        degradationRate: { type: number, minimum: 0, maximum: 1 }
        averageRunCount: { type: number, minimum: 0, maximum: 3 }
        informationSupplementRate: { type: number, minimum: 0, maximum: 1 }
        evidenceHitRate: { type: number, minimum: 0, maximum: 1 }
        adoptionRate: { type: number, minimum: 0, maximum: 1 }
        continuationRate: { type: number, minimum: 0, maximum: 1 }
        retrievalP95Ms: { type: integer, minimum: 0 }
        embeddingP95Ms: { type: integer, minimum: 0 }
        mockData: { type: boolean, enum: [true] }
    AuditEvent:
      type: object
      additionalProperties: false
      required: [eventId, actorUserCode, action, subjectType, subjectId, outcome, metadata, occurredAt, mockData]
      properties:
        eventId: { type: string, format: uuid }
        actorUserCode: { type: string }
        action: { type: string }
        subjectType: { type: string }
        subjectId: { type: string, format: uuid }
        outcome: { type: string, enum: [SUCCEEDED, FAILED, DENIED] }
        metadata: { type: object, additionalProperties: true, description: 不含标题、描述、附件、反馈正文、路径、Token 或思维过程 }
        occurredAt: { type: string, format: date-time }
        mockData: { type: boolean, enum: [true] }
    CompletenessPolicy:
      type: object
      additionalProperties: false
      required: [policyVersion, issueType, generalFieldCodes, issueSpecificFieldCodes, createdAt, mockData]
      properties:
        policyVersion: { type: string }
        issueType: { $ref: '#/components/schemas/IssueTypeValue' }
        generalFieldCodes:
          type: array
          items: { type: string, enum: [PRODUCT, COMPONENT, VERSION, SEVERITY, IMPACT_SCOPE, OCCURRED_AT] }
        issueSpecificFieldCodes: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }
        mockData: { type: boolean, enum: [true] }
    CreateAdminResetRequest:
      type: object
      additionalProperties: false
      required: [environmentCode, confirmationPhrase, reason]
      properties:
        environmentCode: { type: string, enum: [LOCAL] }
        confirmationPhrase: { type: string, enum: [RESET LOCAL MOCK DATA] }
        reason: { type: string, minLength: 1, maxLength: 1000 }
    AdminReset:
      allOf:
        - { $ref: '#/components/schemas/TaskBase' }
        - type: object
          required: [environmentCode, confirmedBy, auditEventId]
          properties:
            environmentCode: { type: string, enum: [LOCAL] }
            confirmedBy: { type: string }
            auditEventId: { type: string, format: uuid }
    KnowledgeDocumentPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/KnowledgeDocument' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    KnowledgeVersionPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/KnowledgeVersion' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    ParseTaskPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/ParseTask' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    IndexTaskPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/IndexTask' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    PrecheckSessionPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/PrecheckSession' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    PrecheckRunPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/PrecheckRun' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    EvaluationRunPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/EvaluationRun' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    AuditEventPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/AuditEvent' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    CompletenessPolicyPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/CompletenessPolicy' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }
    AdminResetPage: { type: object, additionalProperties: false, required: [items, page], properties: { items: { type: array, items: { $ref: '#/components/schemas/AdminReset' } }, page: { $ref: '#/components/schemas/PageMetadata' } } }

  responses:
    ValidationError:
      description: 请求或字段校验失败
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          example: { code: VALIDATION_ERROR, message: 请求字段校验失败, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [{ field: context.title, code: REQUIRED, message: 标题不能为空 }], retryable: false, safeDetails: { mockData: true } }
    Unauthenticated:
      description: 会话不存在或已失效
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: UNAUTHENTICATED, message: 请重新建立本地模拟会话, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } } }
    Forbidden:
      description: 角色或产品线权限不足
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: INSUFFICIENT_ROLE, message: 当前身份无权执行该操作, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } } }
    CsrfValidationFailed:
      description: Session 有效，但 CSRF Token 缺失、为空、不匹配或属于其他 Session
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: CSRF_VALIDATION_FAILED, message: CSRF 校验失败，请恢复当前会话 Token 后重试, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-15T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } } }
    CookieWriteForbidden:
      description: Cookie 写操作的 CSRF 校验失败或角色、产品线权限不足；按稳定 code 区分
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          examples:
            csrfValidationFailed:
              value: { code: CSRF_VALIDATION_FAILED, message: CSRF 校验失败，请恢复当前会话 Token 后重试, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-15T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } }
            insufficientRole:
              value: { code: INSUFFICIENT_ROLE, message: 当前身份无权执行该操作, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-15T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } }
    KnowledgeReviewForbidden:
      description: Cookie 写操作的 CSRF、角色或职责分离校验失败；按稳定 code 区分
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          examples:
            csrfValidationFailed:
              value: { code: CSRF_VALIDATION_FAILED, message: CSRF 校验失败，请恢复当前会话 Token 后重试, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-15T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } }
            insufficientRole:
              value: { code: INSUFFICIENT_ROLE, message: 当前身份无权执行该操作, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-15T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } }
            dutySeparation:
              value: { code: DUTY_SEPARATION_VIOLATION, message: 提交人与审核人必须是不同身份, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-15T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } }
    SafeNotFound:
      description: 资源不存在或当前身份无权读取；不区分两种情况
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: RESOURCE_NOT_FOUND, message: 资源不存在, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: {} } } }
    IdempotencyConflict:
      description: 同一幂等键用于不同规范化请求
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: IDEMPOTENCY_KEY_CONFLICT, message: 幂等键已用于不同请求, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } } }
    IdempotencyOrStateConflict:
      description: 幂等键冲突或资源状态不允许该命令
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, examples: { idempotency: { value: { code: IDEMPOTENCY_KEY_CONFLICT, message: 幂等键已用于不同请求, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } }, state: { value: { code: ILLEGAL_STATE_TRANSITION, message: 当前状态不允许该命令, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } } } } }
    PrecheckContextConflict:
      description: 同一 sourceSystem + hostRequestId 对应不同规范化上下文
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: IDEMPOTENCY_CONTEXT_CONFLICT, message: 宿主请求已关联不同上下文，原记录未覆盖, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } } }
    RunConflict:
      description: 新 Session 要求、三轮上限、终态或幂等冲突
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
          examples:
            newSession: { value: { code: NEW_SESSION_REQUIRED, message: 产品线、产品或组件变化需要新建 Session, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } }
            limit: { value: { code: RUN_LIMIT_REACHED, message: 已达到最多三次 Run, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { maxRuns: 3, mockData: true } } }
            idempotency: { value: { code: IDEMPOTENCY_KEY_CONFLICT, message: 幂等键已用于不同请求, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: false, safeDetails: { mockData: true } } }
    FileLimitError:
      description: 原始文件字节数超过格式上限
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: FILE_TOO_LARGE, message: 文件超过允许的原始字节上限, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [{ field: file, code: MAX_BYTES, message: 文本型 PDF 最大 20971520 字节 }], retryable: false, safeDetails: { mediaType: application/pdf, maxBytes: 20971520, mockData: true } } } }
    UnsupportedMediaType:
      description: 文件类型不支持或 PDF 无文本层
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: PDF_TEXT_LAYER_REQUIRED, message: 一期只接受包含可提取文本层的 PDF, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [{ field: file, code: TEXT_LAYER_REQUIRED, message: 不支持扫描 PDF 或 OCR }], retryable: false, safeDetails: { mockData: true } } } }
    ServiceUnavailable:
      description: 本地依赖暂时不可用
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: SERVICE_UNAVAILABLE, message: 服务暂时不可用，请稍后重试, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: true, safeDetails: { mockData: true } } } }
    PrecheckUnavailable:
      description: 无已确认替代路径的基础能力不可用；不阻断人工继续提交
      content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' }, example: { code: SERVICE_UNAVAILABLE, message: 预诊暂时不可用，仍可人工继续提交, requestId: aaaaaaaa-aaaa-4aaa-8aaa-aaaaaaaaaaaa, timestamp: '2026-07-14T08:00:00Z', fieldErrors: [], retryable: true, safeDetails: { allowedActions: [CONTINUE_SUBMISSION], mockData: true } } } }
    AuthSessionOk:
      description: 当前本地模拟会话；返回当前 Session Token 且禁止缓存
      headers:
        X-CSRF-Token: { $ref: '#/components/headers/CsrfToken' }
        Cache-Control: { $ref: '#/components/headers/NoStore' }
      content: { application/json: { schema: { $ref: '#/components/schemas/AuthSession' } } }
    KnowledgeDocumentOk: { description: 知识文档, content: { application/json: { schema: { $ref: '#/components/schemas/KnowledgeDocument' } } } }
    KnowledgeDocumentPageOk: { description: 分页知识文档, content: { application/json: { schema: { $ref: '#/components/schemas/KnowledgeDocumentPage' } } } }
    KnowledgeVersionOk: { description: 知识版本, content: { application/json: { schema: { $ref: '#/components/schemas/KnowledgeVersion' } } } }
    KnowledgeVersionPageOk: { description: 分页知识版本, content: { application/json: { schema: { $ref: '#/components/schemas/KnowledgeVersionPage' } } } }
    KnowledgeVersionCreated:
      description: 草稿版本和解析任务已创建
      headers: { Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' } }
      content: { application/json: { schema: { $ref: '#/components/schemas/KnowledgeVersionCreatedBody' } } }
    KnowledgeRevisionCreated:
      description: 草稿修订和新解析任务已创建
      headers: { Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' } }
      content: { application/json: { schema: { $ref: '#/components/schemas/KnowledgeRevisionCreatedBody' } } }
    KnowledgeVersionReviewSubmitted:
      description: 版本已进入审核中
      headers: { Idempotency-Replayed: { $ref: '#/components/headers/IdempotencyReplayed' } }
