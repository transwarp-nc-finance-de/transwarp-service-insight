name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - run: ./mvnw spotless:check test
      - run: ./mvnw package -DskipTests
  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - name: Validate v1 and v2 OpenAPI contracts
        run: npm run openapi:check
      - run: npm test
      - run: npm run build
  compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
      - run: docker compose up -d --wait
      - name: Smoke test Sandbox, Session/Run API and feedback
        run: |
          curl --fail --retry 5 http://localhost:5173/sandbox
          test "$(curl --fail --silent http://localhost:5173/api/v1/health | jq -r .status)" = "UP"
          precheck="$(curl --fail --silent -H 'Content-Type: application/json' -d '{"title":"模拟数据：Compose 冒烟","description":"模拟数据：验证本地预诊闭环","product":"Inceptor","module":"SQL","version":"1.0","severity":"P2","impactScope":"单个模拟任务","attachmentsSummary":"模拟附件摘要"}' http://localhost:5173/api/v1/precheck-sessions)"
          echo "$precheck" | jq -e '.humanReviewRequired == true and .references[0].mockData == true and .runSequence == 1 and (.allowedActions | index("CONTINUE_SUBMISSION")) != null and .degradation.code == "DETERMINISTIC_MOCK"'
          precheck_id="$(echo "$precheck" | jq -r .precheckId)"
          session_id="$(echo "$precheck" | jq -r .sessionId)"
          curl --fail --silent -H 'Content-Type: application/json' -d '{"message":"模拟数据：补充脱敏日志"}' "http://localhost:5173/api/v1/precheck-sessions/$session_id/runs" | jq -e '.runSequence == 2 and .references[0].mockData == true and (.allowedActions | index("CONTINUE_SUBMISSION")) != null'
          curl --fail --silent "http://localhost:5173/api/v1/precheck-sessions/$session_id" | jq -e '.runs | length == 2'
          curl --fail --silent -H 'Content-Type: application/json' -d "{\"precheckId\":\"$precheck_id\",\"adoptionStatus\":\"PARTIALLY_ADOPTED\",\"feedbackReason\":\"模拟数据\",\"continuedSubmission\":false}" http://localhost:5173/api/v1/precheck/feedback | jq -e '.recorded == true and .mockData == true and .continuedSubmission == false'
      - name: Verify local identity persistence and PostgreSQL seed constraints
        run: |
          headers="$(mktemp)"
          cookies="$(mktemp)"
          auth="$(curl --fail --silent -D "$headers" -c "$cookies" -H 'Content-Type: application/json' -d '{"userCode":"mock-knowledge-editor","mockData":true}' http://localhost:5173/api/v2/auth-sessions)"
          echo "$auth" | jq -e '.userCode == "mock-knowledge-editor" and .roles == ["KNOWLEDGE_EDITOR"] and (.productLineCodes | sort) == ["STREAMING", "TDH"] and .mockData == true'
          csrf="$(awk 'BEGIN { IGNORECASE=1 } /^X-CSRF-Token:/ { gsub("\\r", "", $2); print $2 }' "$headers")"
          test -n "$csrf"
          grep -i '^Cache-Control: no-store' "$headers"
          test "$(docker compose exec -T postgres psql -U service_insight -d service_insight -tAc 'select count(*) from local_identity where mock_data')" = "4"
          test "$(docker compose exec -T postgres psql -U service_insight -d service_insight -tAc 'select count(*) from flyway_schema_history where success')" = "2"
          docker compose restart backend
          docker compose up -d --wait backend
          restored="$(curl --fail --silent -D "$headers" -b "$cookies" http://localhost:5173/api/v2/auth-sessions/current)"
          echo "$restored" | jq -e '.userCode == "mock-knowledge-editor"'
          test "$(awk 'BEGIN { IGNORECASE=1 } /^X-CSRF-Token:/ { gsub("\\r", "", $2); print $2 }' "$headers")" = "$csrf"
          curl --fail --silent -o /dev/null -b "$cookies" -H "X-CSRF-Token: $csrf" -X DELETE http://localhost:5173/api/v2/auth-sessions/current
      - name: Verify frontend remains available when backend stops
        run: |
          docker compose stop backend
          curl --fail http://localhost:5173/sandbox
          status="$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:5173/api/v1/health)"
          test "$status" = "502" || test "$status" = "504"
      - if: always()
        run: docker compose down --remove-orphans
