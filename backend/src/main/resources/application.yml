spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:service_insight}
    username: ${DB_USER:service_insight}
    password: ${DB_PASSWORD:service_insight_local}
  flyway:
    locations: classpath:db/migration,classpath:db/vendor/postgresql

app:
  embedding:
    base-url: ${LOCAL_EMBEDDING_URL:http://localhost:8090}
    timeout: ${LOCAL_EMBEDDING_TIMEOUT:PT30S}
    query-timeout: ${LOCAL_EMBEDDING_QUERY_TIMEOUT:PT1S}
  knowledge:
    storage-path: ${KNOWLEDGE_STORAGE_PATH:${java.io.tmpdir}/service-insight-knowledge}
  identity:
    session-ttl: PT8H
